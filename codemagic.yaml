workflows:
  android-open-debug:
    name: J2ME-Loader openDebug APK
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      java: 17
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create keystore for build
        script: |
          keytool -genkeypair \
            -keystore /tmp/jl-debug.keystore \
            -alias debug \
            -keyalg RSA -keysize 2048 -validity 365 \
            -storepass android -keypass android \
            -dname "CN=Debug, O=Debug, C=US"
          printf "keyAlias=debug\nkeyPassword=android\nstoreFile=/tmp/jl-debug.keystore\nstorePassword=android\n" > keystore.properties

      - name: Install NDK 22.1.7171670
        script: |
          yes | sdkmanager "ndk;22.1.7171670" --sdk_root="$ANDROID_SDK_ROOT" 2>/dev/null || true

      - name: Build openDebug APK
        script: ./gradlew assembleOpenDebug

    artifacts:
      - app/build/outputs/apk/open/debug/*.apk

    publishing:
      email:
        recipients:
          - sanishgyawali180@gmail.com
        notify:
          success: true
          failure: true
