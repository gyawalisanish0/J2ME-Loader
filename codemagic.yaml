workflows:
  android-open-debug:
    name: J2ME-Loader openDebug APK
    max_build_duration: 30
    environment:
      java: 17
      # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD
      # must be added as secure environment variables in the Codemagic UI
      groups:
        - J2ME Signing
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Restore persistent keystore
        script: |
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/jl-personal.keystore
          printf "keyAlias=%s\nkeyPassword=%s\nstoreFile=/tmp/jl-personal.keystore\nstorePassword=%s\n" \
            "$CM_KEY_ALIAS" "$CM_KEY_PASSWORD" "$CM_STORE_PASSWORD" > keystore.properties

      - name: Install NDK 22.1.7171670
        script: |
          yes | sdkmanager "ndk;22.1.7171670" --sdk_root="$ANDROID_SDK_ROOT" 2>/dev/null || true

      - name: Build openDebug APK
        script: ./gradlew assembleOpenDebug

    artifacts:
      - app/build/outputs/apk/open/debug/*.apk

    publishing:
      email:
        recipients:
          - sanishgyawali180@gmail.com
        notify:
          success: true
          failure: true
