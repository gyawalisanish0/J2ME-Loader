workflows:
  android-open-debug:
    name: J2ME-Loader openDebug APK
    max_build_duration: 30
    environment:
      java: 17
      # CM_KEYSTORE, CM_KEY_ALIAS, CM_KEY_PASSWORD, CM_STORE_PASSWORD
      # must be added as secure environment variables in the Codemagic UI
      groups:
        - J2ME Signing
    scripts:
      - name: Set up local.properties
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Restore and validate keystore
        script: |
          set -e
          echo "$CM_KEYSTORE" | base64 --decode > /tmp/jl-personal.keystore

          echo "--- Keystore type and entry info ---"
          keytool -list -v -keystore /tmp/jl-personal.keystore \
            -storepass "$CM_STORE_PASSWORD" 2>&1 \
            | grep -i "keystore type\|entry type\|alias name"

          echo "--- Converting PKCS12 -> JKS ---"
          keytool -importkeystore \
            -srckeystore /tmp/jl-personal.keystore \
            -srcstoretype PKCS12 \
            -srcstorepass "$CM_STORE_PASSWORD" \
            -destkeystore /tmp/jl-personal.jks \
            -deststoretype JKS \
            -deststorepass "$CM_STORE_PASSWORD" \
            -destkeypass "$CM_KEY_PASSWORD" \
            -srcalias "$CM_KEY_ALIAS" \
            -destalias "$CM_KEY_ALIAS" \
            -noprompt || { echo "ERROR: PKCS12->JKS conversion failed"; exit 1; }

          echo "--- Verifying JKS ---"
          keytool -list -keystore /tmp/jl-personal.jks \
            -storepass "$CM_STORE_PASSWORD" 2>&1 \
            || { echo "ERROR: JKS is not readable after conversion"; exit 1; }

          printf "keyAlias=%s\nkeyPassword=%s\nstoreFile=/tmp/jl-personal.jks\nstorePassword=%s\n" \
            "$CM_KEY_ALIAS" "$CM_KEY_PASSWORD" "$CM_STORE_PASSWORD" > keystore.properties

          echo "--- keystore.properties storeFile line ---"
          grep storeFile keystore.properties
          echo "OK: JKS ready."

      - name: Install NDK 22.1.7171670
        script: |
          yes | sdkmanager "ndk;22.1.7171670" --sdk_root="$ANDROID_SDK_ROOT" 2>/dev/null || true

      - name: Build openDebug APK (via Rosetta 2 for NDK 22 x86_64 binaries)
        script: arch -x86_64 ./gradlew assembleOpenDebug --no-build-cache

    artifacts:
      - app/build/outputs/apk/open/debug/*.apk

    publishing:
      email:
        recipients:
          - sanishgyawali180@gmail.com
        notify:
          success: true
          failure: true
